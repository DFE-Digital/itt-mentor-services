concurrency: build_and_deploy_${{ github.ref_name }}
name: Deploy to AKS cluster
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        type: choice
        default: review
        options:
          - qa
          - review
          - staging
          - sandbox
          - dv_review
          - pt_review
      sha:
        description: Commit sha to be deployed
        required: true
      pr-number:
        description: PR number for review apps (Optional)
        required: false
      dev-cluster:
        description: Development cluster name (Optional)
        required: false

jobs:
  deploy:
    name: ${{ inputs.environment }} deployment
    environment:
      name: ${{ inputs.environment }}
    concurrency: deploy_all
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/deploy-environment
        id: deploy
        with:
          environment: ${{ inputs.environment }}
          docker-image: ${{ inputs.sha }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          pull-request-number: ${{ inputs.pr-number }}
          dev-cluster: ${{ inputs.dev-cluster }}

      - name: Post comment to Pull Request ${{ inputs.pr-number }}
        if: ${{ inputs.environment != 'review' && inputs.environment != 'dv_review' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # Pinned at v3.0.4
        with:
          header: aks
          message: |
            ### Deployments

            | App               | URL                                                                                      |
            | ----------------- | ---------------------------------------------------------------------------------------- |
            | Track & Pay       | <https://track-and-pay-pr-${{ inputs.pr-number }}.test.teacherservices.cloud>            |

      - name: Notify teams channel on job failure
        if: ${{ failure() && inputs.environment != 'review' }}
        uses: DFE-Digital/github-actions/send-to-teams-channel@master
        with:
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          title: Deploy failure
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
          message: |
            Failure deploying release to ${{ inputs.environment }} - Docker tag ${{ inputs.sha }}
